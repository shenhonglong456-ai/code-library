# 乾江盛世科技 — 竞品档案
# 最后更新：2026-03-29
# 数据来源：B线战略定位与竞品分析 + 退货SaaS竞品扫描

our_core_differentiator: |
  唯一同时具备"信息流+实物流"闭环的玩家。
  竞品只有软件（数据层），我们有软件+仓库+AI三位一体，纯软件厂商无法复制。

competitors:

  # ── B线/C线竞品：退货&ERP软件 ──

  万里牛:
    type: ERP
    focus: 多平台退货流程自动化
    strength: 退货自动化流程成熟
    weakness: 无仓库执行能力，纯数据层
    threat_level: 中
    our_advantage: 我们有实体仓+软件，他们只有软件

  吉客云:
    type: ERP
    focus: 多渠道退货管理
    strength: 渠道覆盖广
    weakness: 无实体仓库，无法执行退货分拣
    threat_level: 中
    our_advantage: 信息流+实物流闭环

  易仓ERP:
    type: ERP/跨境
    focus: RMA退货管理+跨境
    strength: 跨境退货流程完善
    weakness: 数据层为主，无仓库运营
    threat_level: 中（D线有交叉）
    our_advantage: 我们有本地仓执行能力

  旺店通:
    type: ERP
    focus: 退货流程自动化
    strength: 电商ERP市场占有率高
    weakness: 无仓储配套
    threat_level: 低
    our_advantage: 差异化赛道

  管易云:
    type: ERP
    focus: 多平台退货+财务
    strength: 财务对接能力强
    weakness: 无仓库运营
    threat_level: 低
    our_advantage: 差异化赛道

  网店管家:
    type: ERP
    focus: 多平台物流管理
    strength: 物流对接能力
    weakness: 无仓库能力
    threat_level: 低
    our_advantage: 差异化赛道

  聚水潭:
    type: ERP
    focus: 电商ERP全链路
    strength: 市场占有率最高，功能全面
    weakness: 大而全但退货场景不够深
    threat_level: 中
    our_advantage: 退货垂直场景更深+AI能力

  # ── D线竞品：跨境转运仓 ──

  中通转运仓:
    type: 跨境物流
    focus: Ozon转运
    strength: 快递网络覆盖广
    weakness: 软件能力弱
    threat_level: 中
    our_advantage: WMS系统自研，定制化强

  梁生服务:
    type: 跨境服务商
    focus: Ozon贴标+转运
    strength: 先发优势
    weakness: 服务标准化程度低
    threat_level: 低
    our_advantage: 系统化+规模化

  跨境巴士:
    type: 跨境物流
    focus: 多平台跨境转运
    strength: 平台覆盖广
    weakness: Ozon专注度不够
    threat_level: 低
    our_advantage: Ozon深耕+本地化

  # ── E线竞品：AI企业服务 ──

  generic_ai_consultants:
    type: AI咨询
    focus: 通用AI落地
    strength: 品牌知名度（如百度智能云、腾讯AI等）
    weakness: 不懂物流/电商具体业务场景
    threat_level: 低（不同赛道）
    our_advantage: 物流+电商垂直经验，自己就是甲方
